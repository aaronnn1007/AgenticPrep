[pytest]
# Pytest configuration for integration tests

# Test discovery
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests/integration

# Minimum version
minversion = 7.0

# Console output options
console_output_style = progress
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:warnings

# Markers
markers =
    integration: Integration tests (select with '-m integration')
    slow: Slow tests (select with '-m slow')
    performance: Performance tests (select with '-m performance')
    contract: Contract validation tests (select with '-m contract')
    edge_case: Edge case tests (select with '-m edge_case')

# Async options
asyncio_mode = auto

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = integration_test.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s - %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Coverage (optional)
# Uncomment to enable coverage reporting
# addopts = 
#     --cov=backend
#     --cov-report=html
#     --cov-report=term

# Timeout
timeout = 600
timeout_method = thread
